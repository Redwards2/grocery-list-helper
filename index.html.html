<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>List Builder</title>
<style>
  :root{
    --cream:#FBF7EE;
    --paper:#FFFDF8;
    --ink:#2E3B2E;
    --ink-soft:#5C6B5C;
    --green:#3F5C42;
    --green-dark:#2A3F2C;
    --green-light:#E7EEDF;
    --mustard:#E3A008;
    --mustard-light:#FBEBC4;
    --coral:#D65A42;
    --coral-light:#FBE4DD;
    --line:#DDD5C2;
  }
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;
    background:var(--cream);
    color:var(--ink);
    padding-bottom:calc(90px + env(safe-area-inset-bottom));
  }
  h1,h2,h3,.headline{
    font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    font-weight:700;
    letter-spacing:-0.01em;
  }
  header{
    background:var(--green);
    color:#fff;
    padding:22px 18px 18px;
    border-radius:0 0 22px 22px;
  }
  header h1{
    margin:0 0 4px;
    font-size:22px;
  }
  header p{
    margin:0;
    font-size:13.5px;
    color:#D9E3D3;
  }
  nav{
    display:flex;
    gap:8px;
    padding:14px 16px 6px;
    max-width:640px;
    margin:0 auto;
  }
  nav button{
    flex:1;
    border:none;
    background:var(--paper);
    border:1px solid var(--line);
    color:var(--ink-soft);
    padding:10px 6px;
    border-radius:12px;
    font-size:13.5px;
    font-weight:700;
    cursor:pointer;
  }
  nav button.active{
    background:var(--green);
    border-color:var(--green);
    color:#fff;
  }
  main{
    max-width:640px;
    margin:0 auto;
    padding:8px 16px 20px;
  }
  .search{
    width:100%;
    padding:12px 14px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--paper);
    font-size:15px;
    margin:10px 0 16px;
  }
  .custom-add{
    display:flex;
    gap:8px;
    margin-bottom:18px;
  }
  .custom-add input{
    flex:1;
    padding:12px 14px;
    border-radius:12px;
    border:1px solid var(--line);
    background:var(--paper);
    font-size:15px;
  }
  .custom-add button{
    background:var(--mustard);
    border:none;
    color:var(--green-dark);
    font-weight:700;
    padding:0 18px;
    border-radius:12px;
    font-size:14px;
    cursor:pointer;
  }
  .category{
    margin-bottom:14px;
  }
  .category-head{
    display:flex;
    align-items:center;
    justify-content:space-between;
    padding:10px 4px;
    cursor:pointer;
    user-select:none;
  }
  .category-head h3{
    margin:0;
    font-size:15px;
    color:var(--green-dark);
  }
  .category-head .chev{
    color:var(--ink-soft);
    font-size:13px;
    transition:transform .15s;
  }
  .category-head.collapsed .chev{transform:rotate(-90deg);}
  .items{
    display:flex;
    flex-direction:column;
    gap:6px;
  }
  .items.collapsed{display:none;}
  .item-row{
    display:flex;
    align-items:center;
    justify-content:space-between;
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:12px;
    padding:10px 12px;
  }
  .item-row.active{
    background:var(--green-light);
    border-color:var(--green);
  }
  .item-row .name{
    font-size:15px;
    flex:1;
  }
  .item-row .tap{
    flex:1;
    display:flex;
    align-items:center;
    gap:10px;
    cursor:pointer;
    padding:2px 0;
  }
  .bullet{
    font-size:18px;
    color:var(--line);
    width:16px;
    text-align:center;
  }
  .item-row.active .bullet{color:var(--green);}
  .stepper{
    display:flex;
    align-items:center;
    gap:8px;
  }
  .stepper button{
    width:26px;
    height:26px;
    border-radius:50%;
    border:1px solid var(--green);
    background:#fff;
    color:var(--green);
    font-size:15px;
    line-height:1;
    cursor:pointer;
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .stepper .qty{
    min-width:16px;
    text-align:center;
    font-weight:700;
    font-size:14px;
  }
  .del-x{
    background:none;
    border:none;
    color:var(--coral);
    font-size:16px;
    cursor:pointer;
    padding:2px 6px;
  }
  .dinner-grid{
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:10px;
    margin-top:10px;
  }
  .dinner-card{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px 12px;
    cursor:pointer;
    text-align:left;
  }
  .dinner-card .num{
    font-size:12px;
    color:var(--mustard);
    font-weight:700;
    margin-bottom:6px;
    display:block;
  }
  .dinner-card .nm{
    font-size:14.5px;
    font-weight:700;
    color:var(--green-dark);
  }
  .overlay{
    position:fixed;
    inset:0;
    background:rgba(46,59,46,0.45);
    display:none;
    align-items:flex-end;
    justify-content:center;
    z-index:50;
  }
  .overlay.show{display:flex;}
  .sheet{
    background:var(--cream);
    width:100%;
    max-width:640px;
    max-height:85vh;
    overflow-y:auto;
    border-radius:22px 22px 0 0;
    padding:18px 18px calc(24px + env(safe-area-inset-bottom));
  }
  .sheet h2{
    margin:0 0 4px;
    font-size:18px;
    color:var(--green-dark);
  }
  .sheet .close{
    float:right;
    background:none;
    border:none;
    font-size:22px;
    color:var(--ink-soft);
    cursor:pointer;
  }
  .ing-row{
    display:flex;
    align-items:center;
    gap:10px;
    padding:10px 4px;
    border-bottom:1px solid var(--line);
  }
  .ing-row input{width:18px;height:18px;accent-color:var(--green);}
  .ing-row label{font-size:15px;flex:1;}
  .primary-btn{
    width:100%;
    background:var(--green);
    color:#fff;
    border:none;
    padding:14px;
    border-radius:12px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    margin-top:14px;
  }
  .float-bar{
    position:fixed;
    bottom:calc(16px + env(safe-area-inset-bottom));
    left:50%;
    transform:translateX(-50%);
    width:calc(100% - 32px);
    max-width:600px;
    background:var(--green-dark);
    color:#fff;
    border:none;
    border-radius:16px;
    padding:14px 18px;
    font-size:15px;
    font-weight:700;
    display:flex;
    align-items:center;
    justify-content:space-between;
    cursor:pointer;
    z-index:40;
  }
  .float-bar .count{
    background:var(--mustard);
    color:var(--green-dark);
    border-radius:20px;
    padding:2px 10px;
    font-size:13px;
  }
  .list-preview{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    padding:16px 18px;
    white-space:pre-wrap;
    font-size:14.5px;
    line-height:1.55;
    color:var(--ink);
    clip-path:polygon(0% 2%,3% 0%,7% 2%,11% 0%,15% 2%,19% 0%,23% 2%,27% 0%,31% 2%,35% 0%,39% 2%,43% 0%,47% 2%,51% 0%,55% 2%,59% 0%,63% 2%,67% 0%,71% 2%,75% 0%,79% 2%,83% 0%,87% 2%,91% 0%,95% 2%,99% 0%,100% 2%,100% 100%,0% 100%);
    margin-bottom:14px;
  }
  .actions-row{
    display:flex;
    gap:10px;
  }
  .actions-row button{flex:1;}
  .ghost-btn{
    background:none;
    border:1px solid var(--coral);
    color:var(--coral);
    padding:14px;
    border-radius:12px;
    font-weight:700;
    font-size:14.5px;
    cursor:pointer;
  }
  .empty-note{
    color:var(--ink-soft);
    font-size:14px;
    text-align:center;
    padding:20px 0;
  }
  .manage-block{
    background:var(--paper);
    border:1px solid var(--line);
    border-radius:14px;
    padding:14px;
    margin-bottom:16px;
  }
  .manage-block h3{margin:0 0 10px;font-size:15px;color:var(--green-dark);}
  .manage-block input, .manage-block select, .manage-block textarea{
    width:100%;
    padding:10px 12px;
    border-radius:10px;
    border:1px solid var(--line);
    font-size:14.5px;
    margin-bottom:8px;
    font-family:inherit;
  }
  .manage-block textarea{min-height:70px;resize:vertical;}
  .tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .tag{
    background:var(--mustard-light);
    color:#6B4E00;
    border-radius:20px;
    padding:5px 10px;
    font-size:12.5px;
    display:flex;
    align-items:center;
    gap:6px;
  }
  .tag button{background:none;border:none;color:#6B4E00;cursor:pointer;font-size:13px;}
  .toast{
    position:fixed;
    top:14px;
    left:50%;
    transform:translateX(-50%);
    background:var(--green-dark);
    color:#fff;
    padding:10px 18px;
    border-radius:20px;
    font-size:13.5px;
    z-index:60;
    opacity:0;
    transition:opacity .2s;
    pointer-events:none;
  }
  .toast.show{opacity:1;}
  .gear{
    position:fixed;
    top:16px;
    right:16px;
    background:rgba(255,255,255,0.15);
    border:none;
    color:#fff;
    width:34px;
    height:34px;
    border-radius:50%;
    font-size:16px;
    cursor:pointer;
    z-index:30;
  }
</style>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
</head>
<body>

<button class="gear" onclick="switchTab('manage')" title="Edit items and dinners">⚙</button>

<header>
  <h1>This Week's List</h1>
  <p>Tap what you need — copy it over to Ryan when you're done.</p>
  <p id="syncStatus" style="font-size:11px;color:#B9CDB0;margin:8px 0 0;"></p>
</header>

<nav>
  <button id="tab-build" class="active" onclick="switchTab('build')">Groceries</button>
  <button id="tab-dinners" onclick="switchTab('dinners')">Dinners</button>
  <button id="tab-history" onclick="switchTab('history')">History</button>
  <button id="tab-manage" onclick="switchTab('manage')">Manage</button>
</nav>

<main>

  <div id="pane-build">
    <input class="search" id="searchBox" placeholder="Search for an item..." oninput="renderLibrary()">
    <div class="custom-add">
      <input id="customItemInput" placeholder="Something else? Type it here">
      <button onclick="addCustomItem()">Add</button>
    </div>
    <div id="libraryContainer"></div>
  </div>

  <div id="pane-dinners" style="display:none;">
    <div class="dinner-grid" id="dinnerGrid"></div>
  </div>

  <div id="pane-history" style="display:none;">
    <div id="historyContainer"></div>
  </div>

  <div id="pane-manage" style="display:none;">
    <div class="manage-block">
      <h3>Add a grocery item</h3>
      <input id="mgrItemName" placeholder="Item name">
      <select id="mgrItemCategory"></select>
      <button class="primary-btn" onclick="mgrAddItem()">Add item</button>
    </div>
    <div class="manage-block">
      <h3>Add a dinner idea</h3>
      <input id="mgrDinnerName" placeholder="Dinner name (e.g. Buffalo chicken flatbreads)">
      <textarea id="mgrDinnerIngredients" placeholder="One ingredient per line"></textarea>
      <button class="primary-btn" id="mgrDinnerSubmitBtn" style="margin-top:0;" onclick="mgrAddDinner()">Add dinner</button>
      <button class="ghost-btn" id="mgrDinnerCancelBtn" style="width:100%;margin-top:10px;display:none;" onclick="mgrCancelEditDinner()">Cancel edit</button>
    </div>
    <div class="manage-block">
      <h3>Existing items</h3>
      <div id="mgrItemList"></div>
    </div>
    <div class="manage-block">
      <h3>Existing dinners</h3>
      <div id="mgrDinnerList"></div>
    </div>
  </div>

</main>

<button class="float-bar" id="floatBar" onclick="openListSheet()" style="display:none;">
  <span>View list</span>
  <span class="count" id="floatCount">0</span>
</button>

<div class="overlay" id="listOverlay" onclick="if(event.target===this)closeListSheet()">
  <div class="sheet">
    <button class="close" onclick="closeListSheet()">×</button>
    <h2>Ready to send</h2>
    <div id="listPreview" class="list-preview"></div>
    <div class="actions-row">
      <button class="primary-btn" onclick="copyList()" style="margin-top:0;">Copy list</button>
    </div>
    <button class="ghost-btn" style="width:100%;margin-top:10px;" onclick="startNewList()">Start new list for next week</button>
    <p style="font-size:12px;color:var(--ink-soft);text-align:center;margin-top:8px;">This saves the current list to History, then clears it.</p>
  </div>
</div>

<div class="overlay" id="dinnerOverlay" onclick="if(event.target===this)closeDinnerSheet()">
  <div class="sheet">
    <button class="close" onclick="closeDinnerSheet()">×</button>
    <h2 id="dinnerSheetTitle"></h2>
    <p style="color:var(--ink-soft);font-size:13.5px;margin-top:0;">Everything's checked. Uncheck what you already have.</p>
    <div id="dinnerIngList"></div>
    <button class="primary-btn" onclick="confirmDinnerAdd()">Add checked items to list</button>
  </div>
</div>

<div class="toast" id="toast"></div>

    firebase.initializeApp(firebaseConfig);

function stateRef(){ return db.collection('app').doc('state'); }

async function loadAll(){
  const statusEl = document.getElementById('syncStatus');
  if(useFirebase){
    statusEl.textContent = 'Connecting…';
    stateRef().onSnapshot(doc=>{
      const data = doc.exists ? (doc.data() || {}) : {};
      const beforeLib = JSON.stringify(data.library || {});
      const beforeDin = JSON.stringify(data.dinners || []);
      list = data.currentList || {items:{}, menu:[]};
      library = migrateProduceSplit(data.library || {});
      library = mergeDefaultsIntoLibrary(library);
      dinners = mergeDefaultsIntoDinners(data.dinners || []);
      renderLibrary();
      renderDinners();
      renderManage();
      updateFloatBar();
      statusEl.textContent = 'Synced across devices';
      if(!doc.exists || JSON.stringify(library)!==beforeLib || JSON.stringify(dinners)!==beforeDin){
        saveState();
      }
    }, err=>{
      console.error(err);
      statusEl.textContent = 'Sync error — check Firebase setup';
    });
  } else {
    statusEl.textContent = 'Not synced yet — add Firebase config to sync across devices';
    list = JSON.parse(localStorage.getItem('currentList') || 'null') || {items:{}, menu:[]};
    library = migrateProduceSplit(JSON.parse(localStorage.getItem('library') || 'null') || {});
    library = mergeDefaultsIntoLibrary(library);
    dinners = mergeDefaultsIntoDinners(JSON.parse(localStorage.getItem('dinners') || 'null') || []);
    saveState();
    renderLibrary();
    renderDinners();
    renderManage();
    updateFloatBar();
  }
}

function saveState(){
  if(useFirebase){
    stateRef().set({library, dinners, currentList:list}).catch(e=> console.error(e));
  } else {
    localStorage.setItem('library', JSON.stringify(library));
    localStorage.setItem('dinners', JSON.stringify(dinners));
    localStorage.setItem('currentList', JSON.stringify(list));
  }
}

const FRUIT_NAMES = new Set(["bananas","strawberries","raspberries","apples","lime","blackberries","pineapple","personal watermelon","watermelon","blueberries","lemon"]);

function migrateProduceSplit(lib){
  if(!lib["Produce"]) return lib;
  if(!lib["Vegetables"]) lib["Vegetables"] = [];
  if(!lib["Fruits"]) lib["Fruits"] = [];
  lib["Produce"].forEach(name=>{
    const target = FRUIT_NAMES.has(name.toLowerCase()) ? "Fruits" : "Vegetables";
    if(!lib[target].some(n=> n.toLowerCase()===name.toLowerCase())) lib[target].push(name);
  });
  Object.keys(list.items || {}).forEach(itemName=>{
    if(list.items[itemName].category==="Produce"){
      list.items[itemName].category = FRUIT_NAMES.has(itemName.toLowerCase()) ? "Fruits" : "Vegetables";
    }
  });
  delete lib["Produce"];
  return lib;
}

function mergeDefaultsIntoDinners(current){
  const existingNames = new Set(current.map(d=> d.name.toLowerCase()));
  DEFAULT_DINNERS.forEach(d=>{
    if(!existingNames.has(d.name.toLowerCase())){
      current.push(d);
      existingNames.add(d.name.toLowerCase());
    }
  });
  return current;
}

function mergeDefaultsIntoLibrary(lib){
  const existingNames = new Set();
  Object.values(lib).forEach(arr=> arr.forEach(n=> existingNames.add(n.toLowerCase())));
  Object.keys(DEFAULT_LIBRARY).forEach(cat=>{
    if(!lib[cat]) lib[cat] = [];
    DEFAULT_LIBRARY[cat].forEach(name=>{
      if(!existingNames.has(name.toLowerCase())){
        lib[cat].push(name);
        existingNames.add(name.toLowerCase());
      }
    });
  });
  return lib;
}

async function saveLibrary(){ saveState(); }
async function saveDinners(){ saveState(); }
async function saveList(){ saveState(); }

async function startNewList(){
  const text = buildListText();
  const hasItems = Object.keys(list.items).length>0 || list.menu.length>0;
  if(hasItems){
    const entry = {savedAt: Date.now(), text, itemCount: Object.keys(list.items).length};
    if(useFirebase){
      try{ await stateRef().collection('pastLists').add(entry); }catch(e){ console.error(e); }
    } else {
      const past = JSON.parse(localStorage.getItem('pastLists') || '[]');
      past.unshift(entry);
      localStorage.setItem('pastLists', JSON.stringify(past.slice(0,50)));
    }
  }
  list = {items:{}, menu:[]};
  saveState();
  renderLibrary();
  updateFloatBar();
  closeListSheet();
  showToast(hasItems ? 'Saved to History — new list started' : 'Started a new list');
}

async function loadHistory(){
  const container = document.getElementById('historyContainer');
  container.innerHTML = '<div class="empty-note">Loading…</div>';
  let entries = [];
  if(useFirebase){
    try{
      const snap = await stateRef().collection('pastLists').orderBy('savedAt','desc').limit(20).get();
      entries = snap.docs.map(d=> d.data());
    }catch(e){ console.error(e); }
  } else {
    entries = JSON.parse(localStorage.getItem('pastLists') || '[]');
  }
  if(entries.length===0){
    container.innerHTML = '<div class="empty-note">No past lists yet. Tap "Start new list" from the list view to save this week\'s here.</div>';
    return;
  }
  window._historyEntries = entries;
  container.innerHTML = entries.map((e,i)=>{
    const date = new Date(e.savedAt).toLocaleDateString(undefined,{month:'short',day:'numeric',year:'numeric'});
    return `
      <div class="manage-block">
        <h3>${esc(date)}</h3>
        <div class="list-preview" style="margin-bottom:10px;">${esc(e.text)}</div>
        <button class="ghost-btn" style="width:100%;" onclick="copyHistoryEntry(${i})">Copy this list</button>
      </div>
    `;
  }).join('');
}

function copyHistoryEntry(i){
  const text = window._historyEntries[i].text;
  navigator.clipboard.writeText(text).then(()=> showToast('Copied!')).catch(()=> showToast('Could not copy'));
}

function switchTab(tab){
  document.getElementById('pane-build').style.display = tab==='build' ? '' : 'none';
  document.getElementById('pane-dinners').style.display = tab==='dinners' ? '' : 'none';
  document.getElementById('pane-history').style.display = tab==='history' ? '' : 'none';
  document.getElementById('pane-manage').style.display = tab==='manage' ? '' : 'none';
  document.getElementById('tab-build').classList.toggle('active', tab==='build');
  document.getElementById('tab-dinners').classList.toggle('active', tab==='dinners');
  document.getElementById('tab-history').classList.toggle('active', tab==='history');
  document.getElementById('tab-manage').classList.toggle('active', tab==='manage');
  if(tab==='history') loadHistory();
}

function renderLibrary(){
  const q = document.getElementById('searchBox').value.trim().toLowerCase();
  const c = document.getElementById('libraryContainer');
  c.innerHTML = '';
  Object.keys(library).forEach(cat=>{
    const itemsInCat = library[cat].filter(n=> n.toLowerCase().includes(q));
    if(q && itemsInCat.length===0) return;
    const wrap = document.createElement('div');
    wrap.className = 'category';
    const collapsed = collapsedCats[cat] && !q;
    wrap.innerHTML = `
      <div class="category-head ${collapsed?'collapsed':''}" onclick="toggleCat('${escAttr(cat)}')">
        <h3>${esc(cat)}</h3>
        <span class="chev">▾</span>
      </div>
      <div class="items ${collapsed?'collapsed':''}" id="cat-${escAttr(cat)}"></div>
    `;
    c.appendChild(wrap);
    const itemsDiv = wrap.querySelector('.items');
    itemsInCat.forEach(name=>{
      const qty = (list.items[name] && list.items[name].qty) || 0;
      const row = document.createElement('div');
      row.className = 'item-row' + (qty>0 ? ' active' : '');
      row.innerHTML = qty>0 ? `
        <div class="tap" onclick="removeItem('${escAttr(name)}')">
          <span class="bullet">✓</span><span class="name">${esc(name)}</span>
        </div>
        <div class="stepper">
          <button onclick="event.stopPropagation();bump('${escAttr(name)}','${escAttr(cat)}',-1)">−</button>
          <span class="qty">${qty}</span>
          <button onclick="event.stopPropagation();bump('${escAttr(name)}','${escAttr(cat)}',1)">+</button>
        </div>
      ` : `
        <div class="tap" onclick="bump('${escAttr(name)}','${escAttr(cat)}',1)" style="flex:1;">
          <span class="bullet">◦</span><span class="name">${esc(name)}</span>
        </div>
      `;
      itemsDiv.appendChild(row);
    });
  });
}

function toggleCat(cat){
  collapsedCats[cat] = !collapsedCats[cat];
  renderLibrary();
}

function removeItem(name){
  delete list.items[name];
  saveState();
  renderLibrary();
  updateFloatBar();
}

function bump(name, cat, delta){
  if(!list.items[name]) list.items[name] = {qty:0, category:cat};
  if(delta===0 && list.items[name].qty===0) delta = 1;
  list.items[name].qty = Math.max(0, list.items[name].qty + delta);
  if(list.items[name].qty===0) delete list.items[name];
  saveList();
  renderLibrary();
  updateFloatBar();
}

function addCustomItem(){
  const input = document.getElementById('customItemInput');
  const name = input.value.trim();
  if(!name) return;
  list.items[name] = {qty: (list.items[name]?list.items[name].qty:0) + 1, category:"Other"};
  input.value = '';
  saveList();
  updateFloatBar();
  showToast('Added "'+name+'"');
}

function updateFloatBar(){
  const count = Object.keys(list.items).length + list.menu.length;
  const bar = document.getElementById('floatBar');
  bar.style.display = count>0 ? 'flex' : 'none';
  document.getElementById('floatCount').textContent = count;
}

function buildListText(){
  const order = ["Meat & deli","Dairy & eggs","Bread & bakery","Frozen","Pantry & snacks","Vegetables","Fruits","Drinks & alcohol","Household & other","Other"];
  let lines = [];
  order.forEach(cat=>{
    Object.keys(list.items).forEach(name=>{
      if(list.items[name].category===cat){
        const qty = list.items[name].qty;
        lines.push('     ◦     ' + name + (qty>1 ? ' x '+qty : ''));
      }
    });
  });
  Object.keys(list.items).forEach(name=>{
    if(!order.includes(list.items[name].category)){
      const qty = list.items[name].qty;
      lines.push('     ◦     ' + name + (qty>1 ? ' x '+qty : ''));
    }
  });
  let out = lines.join('\n');
  if(list.menu.length>0){
    out += '\n\nMenu:\n';
    out += list.menu.map((m,i)=> '      '+(i+1)+'.    '+m).join('\n');
  }
  return out || 'Nothing on the list yet.';
}

function confirmDinnerAdd(){
  if(!activeDinner) return;
  activeDinner.ingredients.forEach((ing,i)=>{
    const checked = document.getElementById('ing-'+i).checked;
    if(checked){
      const cat = findCategoryFor(ing) || "Other";
      list.items[ing] = {qty:(list.items[ing]?list.items[ing].qty:0) + 1, category:cat};
    }
  });
  if(!list.menu.includes(activeDinner.name)) list.menu.push(activeDinner.name);
  saveList();
  renderLibrary();
  updateFloatBar();
  closeDinnerSheet();
  showToast('Added "'+activeDinner.name+'" to the list');
}

function findCategoryFor(name){
  for(const cat of Object.keys(library)){
    if(library[cat].some(n=> n.toLowerCase()===name.toLowerCase())) return cat;
  }
  return null;
}

  document.getElementById('mgrItemName').value = '';
  saveLibrary();
  renderManage();
  renderLibrary();
  showToast('Added "'+name+'" to '+cat);
}
function mgrDeleteItem(cat, name){
  library[cat] = library[cat].filter(n=>n!==name);
  saveLibrary();
  renderManage();
  renderLibrary();
}
function mgrAddDinner(){
  const name = document.getElementById('mgrDinnerName').value.trim();
  const raw = document.getElementById('mgrDinnerIngredients').value.trim();
  if(!name || !raw) return;
  const ingredients = raw.split('\n').map(s=>s.trim()).filter(Boolean);
  if(editingDinnerId){
    const d = dinners.find(x=>x.id===editingDinnerId);
    if(d){ d.name = name; d.ingredients = ingredients; }
    showToast('Updated "'+name+'"');
    mgrCancelEditDinner();
  } else {
    dinners.push({id:'d'+Date.now(), name, ingredients});
    document.getElementById('mgrDinnerName').value = '';
    document.getElementById('mgrDinnerIngredients').value = '';
    showToast('Added dinner "'+name+'"');
  }
  saveDinners();
  renderManage();
  renderDinners();
}
function mgrEditDinner(id){
  const d = dinners.find(x=>x.id===id);
  if(!d) return;
  editingDinnerId = id;
  document.getElementById('mgrDinnerName').value = d.name;
  document.getElementById('mgrDinnerIngredients').value = d.ingredients.join('\n');
  document.getElementById('mgrDinnerSubmitBtn').textContent = 'Save changes';
  document.getElementById('mgrDinnerCancelBtn').style.display = 'block';
  document.getElementById('mgrDinnerName').scrollIntoView({behavior:'smooth', block:'center'});
}
function mgrCancelEditDinner(){
  editingDinnerId = null;
  document.getElementById('mgrDinnerName').value = '';
  document.getElementById('mgrDinnerIngredients').value = '';
  document.getElementById('mgrDinnerSubmitBtn').textContent = 'Add dinner';
  document.getElementById('mgrDinnerCancelBtn').style.display = 'none';
}
function mgrDeleteDinner(id){
  dinners = dinners.filter(d=>d.id!==id);
  if(editingDinnerId===id) mgrCancelEditDinner();
  saveDinners();
  renderManage();
  renderDinners();
}

function showToast(msg){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(()=> t.classList.remove('show'), 1800);
}

function esc(s){ return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function escAttr(s){ return String(s).replace(/'/g, "\\'"); }

loadAll();
</script>
